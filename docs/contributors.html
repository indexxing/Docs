		<div class="container">
			<div class="contributors">
				<div class="contributors-list" id="contributorsList">
					<!-- Contributors will be added here -->
				</div>
			</div>
		</div>

		<div class="container">
			<div class="commits-container" id="commitsContainer">
				<!-- Commits will be added here -->
			</div>
		</div>

		<script>
			const repo = 'Polytoria/Docs';
			const apiUrl = `https://api.github.com/repos/${repo}/contributors`;
			const commitsApiUrl = `https://api.github.com/repos/${repo}/commits`;

			fetch(apiUrl)
				.then((response) => response.json())
				.then((data) => {
					const contributorsList = document.getElementById('contributorsList');
					data.forEach((contributor) => {
						const contributorDiv = document.createElement('div');
						contributorDiv.classList.add('contributor');

						const avatarImg = document.createElement('img');
						avatarImg.src = contributor.avatar_url;
						avatarImg.alt = `${contributor.login}'s avatar`;
						avatarImg.classList.add('avatar');
						contributorDiv.appendChild(avatarImg);

						const nameSpan = document.createElement('span');
						nameSpan.innerText = contributor.login;
						nameSpan.classList.add('name');
						contributorDiv.appendChild(nameSpan);

						const contributionsSpan = document.createElement('span');
						contributionsSpan.innerText = `Contributions: ${contributor.contributions}`;
						contributionsSpan.classList.add('contributions');
						contributorDiv.appendChild(contributionsSpan);

						contributorsList.appendChild(contributorDiv);
					});
				})
				.catch((error) => {
					console.error('Error fetching contributors:', error);
				});

			fetch(commitsApiUrl)
				.then((response) => response.json())
				.then((data) => {
					const commitsContainer = document.getElementById('commitsContainer');
					data.slice(0, 10).forEach((commit) => {
						const commitDiv = document.createElement('div');
						commitDiv.classList.add('commit');

						const avatarImg = document.createElement('img');
						avatarImg.src = commit.author ? commit.author.avatar_url : 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png';
						avatarImg.alt = `${commit.commit.author.name}'s avatar`;
						avatarImg.classList.add('commit-avatar');
						commitDiv.appendChild(avatarImg);

						const commitDetailsDiv = document.createElement('div');
						commitDetailsDiv.classList.add('commit-details');

						const messageSpan = document.createElement('span');
						messageSpan.innerText = commit.commit.message;
						messageSpan.classList.add('commit-message');
						commitDetailsDiv.appendChild(messageSpan);

						const authorSpan = document.createElement('span');
						authorSpan.innerText = `Committed by: ${commit.commit.author.name} (${commit.sha.substring(0, 7)})`;
						authorSpan.classList.add('commit-author');
						commitDetailsDiv.appendChild(authorSpan);

						const dateSpan = document.createElement('span');
						dateSpan.innerText = new Date(commit.commit.author.date).toLocaleString();
						dateSpan.classList.add('commit-date');
						commitDetailsDiv.appendChild(dateSpan);

						commitDiv.appendChild(commitDetailsDiv);

						commitsContainer.appendChild(commitDiv);
					});
				})
				.catch((error) => {
					console.error('Error fetching commits:', error);
				});
		</script>
